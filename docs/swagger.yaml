definitions:
  handlers.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/handlers.UserResponse'
    type: object
  handlers.CreateSpaceRequest:
    properties:
      name:
        type: string
    type: object
  handlers.InviteMemberRequest:
    properties:
      email:
        type: string
      role:
        type: string
    type: object
  handlers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handlers.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  handlers.SpaceDetail:
    properties:
      id:
        type: integer
      members:
        items:
          $ref: '#/definitions/handlers.SpaceMember'
        type: array
      name:
        type: string
      owner_id:
        type: integer
      type:
        type: string
    type: object
  handlers.SpaceListItem:
    properties:
      id:
        type: integer
      name:
        type: string
      role:
        type: string
      type:
        type: string
    type: object
  handlers.SpaceMember:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
    type: object
  handlers.Todo:
    properties:
      assignee_id:
        type: integer
      description:
        type: string
      done:
        type: boolean
      id:
        type: integer
      parent_id:
        type: integer
      priority:
        type: string
      space_id:
        type: integer
      tag:
        type: string
      title:
        type: string
    type: object
  handlers.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
info:
  contact: {}
  description: 'API for tasks with JWT auth and spaces (personal + corporate). Register
    or login at /api/auth/*; use GET /api/auth/check to validate session. Send token
    as Authorization: Bearer &lt;token&gt; for /api/todos, /api/create, /api/spaces.
    Todos support space_id and assignee_id for corporate workspaces.'
  title: Task.grid API
  version: "1.0"
paths:
  /api/auth/check:
    get:
      description: Validate JWT and return minimal user profile. Returns 401 if token
        missing or expired. Use periodically (e.g. every 5 min) to keep session alive.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.UserResponse'
        "401":
          description: Unauthorized
      security:
      - BearerAuth: []
      summary: Check session
      tags:
      - auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: 'Returns JWT and user info. Use token in Authorization: Bearer
        <token> for /api/todos and /api/create.'
      parameters:
      - description: email, password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthResponse'
        "400":
          description: Email and password required
        "401":
          description: Invalid email or password
      summary: Login
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Create account with email, password (min 8 chars), and optional
        name.
      parameters:
      - description: email, password, name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AuthResponse'
        "400":
          description: Invalid input
        "409":
          description: Email already registered
      summary: Register new user
      tags:
      - auth
  /api/create:
    post:
      consumes:
      - application/json
      description: 'create new todo. Optional space_id (default: personal), assignee_id
        (required in corporate; must be space member). In personal space assignee
        = current user.'
      parameters:
      - description: Todo (title required; space_id, assignee_id optional)
        in: body
        name: todo
        required: true
        schema:
          $ref: '#/definitions/handlers.Todo'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.Todo'
      security:
      - BearerAuth: []
      summary: Create todo
      tags:
      - todos
  /api/spaces:
    get:
      description: List spaces for the current user (personal + corporate where member).
        Ensures personal space exists.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.SpaceListItem'
            type: array
      security:
      - BearerAuth: []
      summary: List spaces
      tags:
      - spaces
    post:
      consumes:
      - application/json
      description: Create a new corporate space. Caller becomes owner and admin.
      parameters:
      - description: name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateSpaceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SpaceListItem'
      security:
      - BearerAuth: []
      summary: Create corporate space
      tags:
      - spaces
  /api/spaces/{id}:
    get:
      description: Get space details and members (for corporate). Caller must be a
        member.
      parameters:
      - description: Space ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.SpaceDetail'
        "403":
          description: Not a member
        "404":
          description: Space not found
      security:
      - BearerAuth: []
      summary: Get space by ID
      tags:
      - spaces
  /api/spaces/{id}/members:
    post:
      consumes:
      - application/json
      description: Add a user to the space by email. Caller must be admin. User must
        already exist.
      parameters:
      - description: Space ID
        in: path
        name: id
        required: true
        type: integer
      - description: email, role
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.InviteMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "403":
          description: Not admin
        "404":
          description: User not found
      security:
      - BearerAuth: []
      summary: Invite member to space
      tags:
      - spaces
  /api/todos:
    get:
      description: 'get list of todos in the given space. Use space_id query (default:
        user''s personal space). In corporate space, members see only their assigned
        tasks unless admin.'
      parameters:
      - description: 'Space ID (default: personal)'
        in: query
        name: space_id
        type: integer
      - description: Filter children of this todo id
        in: query
        name: parent_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handlers.Todo'
            type: array
      security:
      - BearerAuth: []
      summary: Get todos in a space
      tags:
      - todos
  /api/todos/{id}:
    delete:
      description: 'delete todo by id (only own todos; cascade: deletes all descendants
        first)'
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No content
        "404":
          description: Todo not found
      security:
      - BearerAuth: []
      summary: Delete todo
      tags:
      - todos
    patch:
      consumes:
      - application/json
      description: update todo by id (only own todos). Use for edit and for complete/undo.
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update (title and/or done)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handlers.Todo'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.Todo'
        "404":
          description: Todo not found
      security:
      - BearerAuth: []
      summary: Update todo
      tags:
      - todos
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
