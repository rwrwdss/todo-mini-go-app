definitions:
  internal_handlers.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/internal_handlers.UserResponse'
    type: object
  internal_handlers.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  internal_handlers.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
  internal_handlers.Todo:
    properties:
      description:
        type: string
      done:
        type: boolean
      id:
        type: integer
      parent_id:
        type: integer
      priority:
        type: string
      tag:
        type: string
      title:
        type: string
    type: object
  internal_handlers.UserResponse:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
info:
  contact: {}
  description: 'API for tasks with JWT auth. Register or login at /api/auth/* to get
    a token; send it as Authorization: Bearer &lt;token&gt; for /api/todos and /api/create.'
  title: Task.grid API
  version: "1.0"
paths:
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: 'Returns JWT and user info. Use token in Authorization: Bearer
        <token> for /api/todos and /api/create.'
      parameters:
      - description: email, password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AuthResponse'
        "400":
          description: Email and password required
        "401":
          description: Invalid email or password
      summary: Login
      tags:
      - auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Create account with email, password (min 8 chars), and optional
        name.
      parameters:
      - description: email, password, name
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.AuthResponse'
        "400":
          description: Invalid input
        "409":
          description: Email already registered
      summary: Register new user
      tags:
      - auth
  /api/create:
    post:
      consumes:
      - application/json
      description: create new todo for the authenticated user (title required; description,
        priority, tag, parent_id optional)
      parameters:
      - description: Todo object
        in: body
        name: todo
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.Todo'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.Todo'
      security:
      - BearerAuth: []
      summary: Create todo
      tags:
      - todos
  /api/todos:
    get:
      description: get list of todos for the authenticated user. Optional query parent_id
        to filter by parent.
      parameters:
      - description: Filter children of this todo id
        in: query
        name: parent_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_handlers.Todo'
            type: array
      security:
      - BearerAuth: []
      summary: Get all todos
      tags:
      - todos
  /api/todos/{id}:
    delete:
      description: 'delete todo by id (only own todos; cascade: deletes all descendants
        first)'
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No content
        "404":
          description: Todo not found
      security:
      - BearerAuth: []
      summary: Delete todo
      tags:
      - todos
    patch:
      consumes:
      - application/json
      description: update todo by id (only own todos). Use for edit and for complete/undo.
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update (title and/or done)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.Todo'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.Todo'
        "404":
          description: Todo not found
      security:
      - BearerAuth: []
      summary: Update todo
      tags:
      - todos
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
